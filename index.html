<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medidor de Aura e Protagonismo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
        }

        body.theme-dark {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
        }

        body.theme-light {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
        }

        body.theme-neon {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
        }

        body.theme-nature {
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            color: #fff;
        }

        body.theme-sunset {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            color: #fff;
        }

        body.theme-ocean {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        body.theme-fire {
            background: linear-gradient(135deg, #f12711 0%, #f5af19 100%);
            color: #fff;
        }

        body.theme-galaxy {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 50%, #2c3e50 100%);
            color: #fff;
        }

        body.theme-candy {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
        }

        body.theme-mint {
            background: linear-gradient(135deg, #00f260 0%, #0575e6 100%);
            color: #fff;
        }

        body.theme-purple {
            background: linear-gradient(135deg, #8e2de2 0%, #4a00e0 100%);
            color: #fff;
        }

        body.theme-rainbow {
            background: linear-gradient(135deg, #ff0080 0%, #ff8c00 20%, #40e0d0 40%, #ff0080 60%, #7b68ee 80%, #ff1493 100%);
            color: #fff;
        }

        body.theme-midnight {
            background: linear-gradient(135deg, #000428 0%, #004e92 100%);
            color: #fff;
        }

        body.theme-rose {
            background: linear-gradient(135deg, #e65c00 0%, #f9d423 100%);
            color: #fff;
        }

        body.theme-ice {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .user-section {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .user-welcome {
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .admin-badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-left: 10px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .btn-register, .btn-logout {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            background: #51cf66;
            color: white;
            transition: all 0.3s;
        }

        .btn-logout {
            background: #ff6b6b;
            margin-left: 10px;
        }

        .btn-register:hover, .btn-logout:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .register-form {
            background: rgba(255, 255, 255, 0.15);
            padding: 25px;
            border-radius: 15px;
            max-width: 400px;
            margin: 20px auto;
            backdrop-filter: blur(10px);
        }

        .register-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        .register-form button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #51cf66;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .register-form button:hover {
            transform: scale(1.02);
        }

        .admin-controls {
            background: rgba(255, 100, 100, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border: 2px solid rgba(255, 100, 100, 0.5);
        }

        .admin-controls button {
            background: #ff6b6b;
            margin: 5px;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        select, input {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        select:hover, input:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .person-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            transition: all 0.3s;
        }

        .person-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.5);
        }

        .person-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .person-name {
            font-size: 1.8em;
            font-weight: bold;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }

        .controls-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-minus, .btn-plus {
            width: 45px;
            height: 45px;
            font-size: 1.5em;
        }

        .btn-minus {
            background: #ff6b6b;
            color: white;
        }

        .btn-plus {
            background: #51cf66;
            color: white;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .like-section {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-like, .btn-dislike {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-like.active {
            background: #51cf66;
        }

        .btn-dislike.active {
            background: #ff6b6b;
        }

        .comments-section {
            margin-top: 20px;
        }

        .comment-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        .btn-comment {
            background: #339af0;
            color: white;
            width: 100%;
        }

        .comments-list {
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .comment {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.9em;
            position: relative;
        }

        .comment-delete {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff6b6b;
            border: none;
            border-radius: 5px;
            padding: 3px 8px;
            font-size: 0.8em;
            cursor: pointer;
            color: white;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .share-link {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        .link-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            word-break: break-all;
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
        }
    </style>
</head>
<body class="theme-dark">
    <div class="container">
        <header>
            <h1>✨ Medidor de Aura e Protagonismo ✨</h1>
            <p class="subtitle">Avalia o protagonismo e a aura das pessoas da turma :D</p>
        </header>

        <div class="user-section" id="userSection">
            <div id="guestView">
                <p class="user-welcome">👋 Olá! Estás a usar como convidado</p>
                <button class="btn-register" onclick="showRegisterForm()">📝 Entrar</button>
            </div>
            
            <div id="loggedView" class="hidden">
                <p class="user-welcome">
                    👋 Olá, <strong id="username"></strong>!
                    <span id="adminBadge" class="admin-badge hidden">👑 ADMIN</span>
                </p>
                <button class="btn-logout" onclick="logout()">🚪 Sair</button>
            </div>

            <div id="registerForm" class="register-form hidden">
                <h3 style="margin-bottom: 15px;">Entrar</h3>
                <input type="text" id="regName" placeholder="Teu nome">
                <button onclick="register()">✓ Entrar</button>
                <button onclick="hideRegisterForm()" style="background: #666; margin-top: 10px;">✕ Cancelar</button>
            </div>
        </div>

        <div id="loadingScreen" class="loading">
            🔄 A carregar dados...
        </div>

        <div id="mainContent" class="hidden">
            <div class="controls">
                <select id="themeSelect">
                    <option value="theme-dark">🌙 Tema Escuro</option>
                    <option value="theme-light">☀️ Tema Claro</option>
                    <option value="theme-neon">💜 Tema Neon</option>
                    <option value="theme-nature">🌿 Tema Natureza</option>
                    <option value="theme-sunset">🌅 Tema Pôr do Sol</option>
                    <option value="theme-ocean">🌊 Tema Oceano</option>
                    <option value="theme-fire">🔥 Tema Fogo</option>
                    <option value="theme-galaxy">🌌 Tema Galáxia</option>
                    <option value="theme-candy">🍭 Tema Doce</option>
                    <option value="theme-mint">🍃 Tema Menta</option>
                    <option value="theme-purple">💜 Tema Roxo</option>
                    <option value="theme-rainbow">🌈 Tema Arco-Íris</option>
                    <option value="theme-midnight">🌃 Tema Meia-Noite</option>
                    <option value="theme-rose">🌹 Tema Rosa</option>
                    <option value="theme-ice">❄️ Tema Gelo</option>
                </select>

                <select id="sortSelect">
                    <option value="alpha">📝 Ordem Alfabética</option>
                    <option value="aura-desc">⬆️ Maior Aura</option>
                    <option value="aura-asc">⬇️ Menor Aura</option>
                    <option value="prot-desc">⭐ Maior Protagonismo</option>
                    <option value="prot-asc">💤 Menor Protagonismo</option>
                </select>

                <input type="number" id="limitSelect" placeholder="Ver quantas pessoas?" min="1">
            </div>

            <div id="adminPanel" class="hidden" style="background: rgba(255, 100, 100, 0.2); padding: 20px; border-radius: 15px; margin-bottom: 20px;">
                <h3>👑 Painel Admin</h3>
                <div style="margin-top: 15px;">
                    <input type="text" id="newPersonName" placeholder="Nome da nova pessoa" style="margin-right: 10px;">
                    <button onclick="addPerson()" style="background: #51cf66;">➕ Adicionar Pessoa</button>
                </div>
            </div>

            <div id="peopleContainer"></div>

            <div class="share-link">
                <h3>📤 Partilha com os colegas!</h3>
                <p>Copia este link e envia para a turma:</p>
                <div class="link-box" id="shareLink"></div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '$2a$10$ZSOt.I/bSrDUQutkrLhMM.bhZUFSiH2LBbKM0WabgTjkTtKaeUKIa';
        const ADMIN_NAME = 'TomáséoAdm';
        
        let BIN_ID = localStorage.getItem('binId');
        let data = {};
        let isAdmin = false;
        let currentPeople = [];

        const badWords = ['merda', 'caralho', 'foda', 'puta', 'cu', 'porra', 'burro', 'idiota'];

        function censorComment(text) {
            let censored = text;
            badWords.forEach(word => {
                const regex = new RegExp(word, 'gi');
                censored = censored.replace(regex, '*'.repeat(word.length));
            });
            return censored;
        }

        async function createBin() {
            const initialData = {
                people: ["Ana", "André", "Beatriz", "Bruno", "Carolina", "Diana", "Duarte", "Fábio", "Francisco", "Gabriel", "Gabriela", "Íris", "José", "Kévim", "Luís", "Mafalda", "Mara", "Maria", "Matilde", "Miriam", "Pedro", "Rafael", "Renato", "Santiago", "Soraia", "Tomás"],
                data: {}
            };

            ["Ana", "André", "Beatriz", "Bruno", "Carolina", "Diana", "Duarte", "Fábio", "Francisco", "Gabriel", "Gabriela", "Íris", "José", "Kévim", "Luís", "Mafalda", "Mara", "Maria", "Matilde", "Miriam", "Pedro", "Rafael", "Renato", "Santiago", "Soraia", "Tomás"].forEach(person => {
                initialData.data[person] = {
                    aura: 0,
                    protagonismo: 0,
                    likes: 0,
                    dislikes: 0,
                    comments: [],
                    userVotes: {}
                };
            });

            try {
                const response = await fetch('https://api.jsonbin.io/v3/b', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify(initialData)
                });

                const result = await response.json();
                BIN_ID = result.metadata.id;
                localStorage.setItem('binId', BIN_ID);
                return initialData;
            } catch (error) {
                alert('❌ Erro ao criar bin!');
                return initialData;
            }
        }

        async function loadData() {
            if (!BIN_ID) {
                return await createBin();
            }

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: {
                        'X-Master-Key': API_KEY
                    }
                });

                const result = await response.json();
                return result.record;
            } catch (error) {
                return await createBin();
            }
        }

        async function saveData() {
            if (!BIN_ID) return;

            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify({ people: currentPeople, data: data })
                });
            } catch (error) {
                // Erro silencioso
            }
        }

        function getUserId() {
            let userId = localStorage.getItem('userId');
            if (!userId) {
                userId = 'user_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('userId', userId);
            }
            return userId;
        }

        const userId = getUserId();

        function checkUser() {
            const userName = localStorage.getItem('userName');
            if (userName) {
                document.getElementById('guestView').classList.add('hidden');
                document.getElementById('loggedView').classList.remove('hidden');
                document.getElementById('username').textContent = userName;
                
                isAdmin = userName === ADMIN_NAME;
                if (isAdmin) {
                    document.getElementById('adminBadge').classList.remove('hidden');
                    document.getElementById('adminPanel').classList.remove('hidden');
                }
            } else {
                document.getElementById('guestView').classList.remove('hidden');
                document.getElementById('loggedView').classList.add('hidden');
            }
        }

        function showRegisterForm() {
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('guestView').classList.add('hidden');
        }

        function hideRegisterForm() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('guestView').classList.remove('hidden');
        }

        function register() {
            const name = document.getElementById('regName').value.trim();
            
            if (name) {
                localStorage.setItem('userName', name);
                hideRegisterForm();
                checkUser();
            } else {
                alert('❌ Por favor, insere o teu nome!');
            }
        }

        function logout() {
            localStorage.removeItem('userName');
            isAdmin = false;
            document.getElementById('adminPanel').classList.add('hidden');
            checkUser();
        }

        async function updateAura(person, change) {
            if (data[person]) {
                data[person].aura += change;
                await saveData();
                renderPeople();
            }
        }

        async function updateProtagonismo(person, change) {
            if (data[person]) {
                data[person].protagonismo = Math.max(0, data[person].protagonismo + change);
                await saveData();
                renderPeople();
            }
        }

        async function toggleLike(person, type) {
            if (!data[person]) return;
            
            const currentVote = data[person].userVotes[userId];
            
            if (currentVote === type) {
                if (type === 'like') data[person].likes--;
                else data[person].dislikes--;
                delete data[person].userVotes[userId];
            } else {
                if (currentVote === 'like') data[person].likes--;
                if (currentVote === 'dislike') data[person].dislikes--;
                
                if (type === 'like') data[person].likes++;
                else data[person].dislikes++;
                data[person].userVotes[userId] = type;
            }
            
            await saveData();
            renderPeople();
        }

        async function addComment(person, comment) {
            if (!data[person]) return;
            
            if (comment.trim()) {
                const censored = censorComment(comment);
                const userName = localStorage.getItem('userName') || 'Anónimo';
                
                data[person].comments.push({
                    text: censored,
                    date: new Date().toLocaleString('pt-PT'),
                    author: userName,
                    id: Date.now() + '_' + Math.random()
                });
                await saveData();
                renderPeople();
            }
        }

        async function deleteComment(person, commentId) {
            if (!isAdmin || !data[person]) return;
            
            data[person].comments = data[person].comments.filter(c => c.id !== commentId);
            await saveData();
            renderPeople();
        }

        async function removePerson(person) {
            if (!isAdmin) return;
            
            if (confirm(`Tens a certeza que queres remover ${person}?`)) {
                currentPeople = currentPeople.filter(p => p !== person);
                delete data[person];
                await saveData();
                renderPeople();
            }
        }

        async function addPerson() {
            if (!isAdmin) return;
            
            const name = document.getElementById('newPersonName').value.trim();
            if (name && !currentPeople.includes(name)) {
                currentPeople.push(name);
                currentPeople.sort();
                data[name] = {
                    aura: 0,
                    protagonismo: 0,
                    likes: 0,
                    dislikes: 0,
                    comments: [],
                    userVotes: {}
                };
                await saveData();
                document.getElementById('newPersonName').value = '';
                renderPeople();
            } else {
                alert('❌ Nome inválido ou já existe!');
            }
        }

        async function adminSetLikes(person, likes, dislikes) {
            if (!isAdmin || !data[person]) return;
            
            const newLikes = prompt(`Likes para ${person}:`, likes);
            const newDislikes = prompt(`Dislikes para ${person}:`, dislikes);
            
            if (newLikes !== null) data[person].likes = parseInt(newLikes) || 0;
            if (newDislikes !== null) data[person].dislikes = parseInt(newDislikes) || 0;
            
            await saveData();
            renderPeople();
        }

        function getSortedPeople() {
            const sortType = document.getElementById('sortSelect').value;
            const limit = parseInt(document.getElementById('limitSelect').value) || currentPeople.length;
            
            let sorted = [...currentPeople];
            
            switch(sortType) {
                case 'aura-desc':
                    sorted.sort((a, b) => (data[b]?.aura || 0) - (data[a]?.aura || 0));
                    break;
                case 'aura-asc':
                    sorted.sort((a, b) => (data[a]?.aura || 0) - (data[b]?.aura || 0));
                    break;
                case 'prot-desc':
                    sorted.sort((a, b) => (data[b]?.protagonismo || 0) - (data[a]?.protagonismo || 0));
                    break;
                case 'prot-asc':
                    sorted.sort((a, b) => (data[a]?.protagonismo || 0) - (data[b]?.protagonismo || 0));
                    break;
            }
            
            return sorted.slice(0, limit);
        }

        function renderPeople() {
            const container = document.getElementById('peopleContainer');
            const sortedPeople = getSortedPeople();
            
            container.innerHTML = sortedPeople.map(person => {
                const personData = data[person] || {aura: 0, protagonismo: 0, likes: 0, dislikes: 0, comments: [], userVotes: {}};
                const userVote = personData.userVotes[userId];
                const protWidth = Math.min(100, Math.max(0, personData.protagonismo));
                
                return `
                    <div class="person-card">
                        <div class="person-header">
                            <div class="person-name">${person}</div>
                            ${isAdmin ? `<button onclick="removePerson('${person}')" style="background: #ff6b6b; padding: 8px 15px; font-size: 0.9em;">🗑️ Remover</button>` : ''}
                        </div>
                        
                        <div class="stats">
                            <div class="stat-box">
                                <div class="stat-label">⚡ Aura</div>
                                <div class="stat-value">${personData.aura}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">⭐ Protagonismo</div>
                                <div class="stat-value">${personData.protagonismo}%</div>
                            </div>
                        </div>

                        <div class="controls-row">
                            <button class="btn-minus" onclick="updateAura('${person}', -1)">−</button>
                            <span style="flex: 1; text-align: center; font-weight: bold;">Aura</span>
                            <button class="btn-plus" onclick="updateAura('${person}', 1)">+</button>
                        </div>

                        <div class="controls-row">
                            <button class="btn-minus" onclick="updateProtagonismo('${person}', -5)">−</button>
                            <span style="flex: 1; text-align: center; font-weight: bold;">Protagonismo</span>
                            <button class="btn-plus" onclick="updateProtagonismo('${person}', 5)">+</button>
                        </div>

                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${protWidth}%">
                                ${personData.protagonismo}%
                            </div>
                        </div>

                        <div class="like-section">
                            <button class="btn-like ${userVote === 'like' ? 'active' : ''}" 
                                    onclick="toggleLike('${person}', 'like')">
                                👍 ${personData.likes}
                            </button>
                            <button class="btn-dislike ${userVote === 'dislike' ? 'active' : ''}" 
                                    onclick="toggleLike('${person}', 'dislike')">
                                👎 ${personData.dislikes}
                            </button>
                            ${isAdmin ? `<button onclick="adminSetLikes('${person}', ${personData.likes}, ${personData.dislikes})" style="background: #9b59b6; padding: 12px;">⚙️</button>` : ''}
                        </div>

                        <div class="comments-section">
                            <input type="text" class="comment-input" id="comment-${person}" 
                                   placeholder="Escreve um comentário...">
                            <button class="btn-comment" onclick="addComment('${person}', document.getElementById('comment-${person}').value); document.getElementById('comment-${person}').value = ''">
                                💬 Comentar
                            </button>
                            
                            <div class="comments-list">
                                ${personData.comments.map(c => `
                                    <div class="comment">
                                        ${isAdmin ? `<button class="comment-delete" onclick="deleteComment('${person}', '${c.id}')">✕</button>` : ''}
                                        <div><strong>${c.author}</strong> • ${c.date}</div>
                                        <div>${c.text}</div>
                                    </div>
                                `).reverse().join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('themeSelect').addEventListener('change', (e) => {
            document.body.className = e.target.value;
            localStorage.setItem('theme', e.target.value);
        });

        document.getElementById('sortSelect').addEventListener('change', renderPeople);
        document.getElementById('limitSelect').addEventListener('input', renderPeople);

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.body.className = savedTheme;
            document.getElementById('themeSelect').value = savedTheme;
        }

        document.getElementById('shareLink').textContent = window.location.href;

        async function init() {
            const loadedData = await loadData();
            data = loadedData.data;
            currentPeople = loadedData.people;
            
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            
            checkUser();
            renderPeople();
            
            setInterval(async () => {
                const newData = await loadData();
                data = newData.data;
                currentPeople = newData.people;
                renderPeople();
            }, 5000);
        }

        init();
    </script>
</body>
</html>
